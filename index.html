<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#211d15">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Mike's Dads">
<title>Mike's Dads — GIM tracker</title>
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400..700&family=VT323&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box}
  body{margin:0;background:#0f0d09;color:#e8dfc8;font-family:system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:#6fb3d2}a:hover{color:#9fd0e8}
  input:focus,textarea:focus{outline:none}
  ::placeholder{color:#57503f}
  ::-webkit-scrollbar{width:0;height:4px}
  ::-webkit-scrollbar-thumb{background:#57503f;border-radius:2px}
  @keyframes gimPulse{0%,100%{opacity:.5}50%{opacity:1}}
  #boot-msg{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:#0f0d09;text-align:center;padding:30px;color:#8a8069;font-size:13px}
  #boot-msg .emblem{width:54px;height:54px;background:#3a3327;border:2px solid #f4c542;border-radius:10px;display:grid;place-items:center;font-size:26px;animation:gimPulse 1.6s ease-in-out infinite}
</style>
</head>
<body>
<div id="root"></div>
<div id="boot-msg"><div class="emblem">⚔</div><div id="boot-text">Loading the tracker…</div></div>
<script>
  window.__SUPA_URL = 'https://lctybyllbgswhwhmgqui.supabase.co';  /* filled at build */
  window.__SUPA_KEY = 'sb_publishable_YkFbeooSNKvbvyGOgULixQ_naYwOCIK';
</script>
<script src="https://cdn.jsdelivr.net/npm/preact@10.19.3/dist/preact.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htm@3.1.1/dist/htm.umd.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.2/dist/umd/supabase.js"></script>

<script>
  /* app-bundle loader: fetches the current app build from the group's own
     backend, caches it for offline, and boots it. The GitHub page never needs
     to change again — updates are pushed straight to the bundle store. */
  (async function boot() {
    const say = t => { const el = document.getElementById('boot-text'); if (el) el.textContent = t; };
    let bundle = window.__BUNDLE_INLINE || null;
    if (!bundle) {
      try {
        const sb = window.supabase.createClient(window.__SUPA_URL, window.__SUPA_KEY);
        const timeout = new Promise((_, rej) => setTimeout(() => rej(new Error('timeout')), 7000));
        const { data } = await Promise.race([sb.rpc('gim_get_bundle'), timeout]);
        if (data && data.data) { bundle = data; try { localStorage.setItem('gim-bundle', JSON.stringify(data)); } catch (e) {} }
      } catch (e) {}
    }
    if (!bundle) { try { bundle = JSON.parse(localStorage.getItem('gim-bundle') || 'null'); } catch (e) {} }
    if (!bundle || !bundle.data) { say("Can't reach the cloud to load the tracker — check your internet and reopen."); return; }
    try {
      const bytes = Uint8Array.from(atob(bundle.data), c => c.charCodeAt(0));
      const js = await new Response(new Blob([bytes]).stream().pipeThrough(new DecompressionStream('gzip'))).text();
      const bm = document.getElementById('boot-msg'); if (bm) bm.remove();
      (0, eval)(js);
    } catch (e) { say('App failed to start: ' + e.message); }
  })();
  if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
    addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(() => {}));
  }
</script>
</body>
</html>
